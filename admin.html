<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Drinks Admin</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="app">
    <header class="topbar">
      <div>
        <h1>📊 Drinks Admin</h1>
        <p>Totais, custo por unidade e resumo final.</p>
      </div>
      <div class="nav-row">
        <a class="nav-link" href="public.html">Público</a>
        <a class="nav-link" href="private.html">Privado</a>
      </div>
    </header>

    <main>
      <section class="card">
        <div class="section-title-row">
          <h2>Resumo geral / rateio</h2>
          <button id="exportBtn" class="secondary small">Copiar resumo</button>
        </div>

        <div class="admin-grid">
          <div>
            <label for="unitCost">Custo por unidade (£)</label>
            <input id="unitCost" type="number" step="0.01" min="0" placeholder="Ex: 1.05" />
            <p class="hint">Arredonda para cima no quarter. Ex: 1.05 → 1.25</p>
          </div>
          <div>
            <label for="roundStep">Quarter de arredondamento (£)</label>
            <select id="roundStep">
              <option value="0.25" selected>0.25</option>
              <option value="0.5">0.50</option>
              <option value="1">1.00</option>
            </select>
          </div>
        </div>

        <div class="totals-row">
          <div class="stat">
            <span>Total de unidades</span>
            <strong id="totalUnits">0</strong>
          </div>
          <div class="stat">
            <span>Valor arredondado por unidade</span>
            <strong id="roundedUnitCost">£0.00</strong>
          </div>
        </div>

        <div class="tables">
          <div>
            <h3>Totais por bebida</h3>
            <div id="drinkTotals" class="summary-list"></div>
          </div>
          <div>
            <h3>Totais por pessoa</h3>
            <div id="personTotals" class="summary-list"></div>
          </div>
        </div>
      </section>
    </main>
  </div>

  <script src="data.js"></script>
  <script src="admin.js"></script>
</body>
</html>

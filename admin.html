<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Drinks Admin</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="app">
    <header class="topbar">
      <div>
        <h1>📊 Drinks Admin</h1>
        <p>Totais, custo por unidade e resumo final.</p>
      </div>
    </header>

    <main>
      <section class="card">
        <div class="section-title-row">
          <h2>Resumo geral / rateio</h2>
          <div class="inline-actions">
            <button id="refreshBtn" class="secondary small">Atualizar</button>
            <button id="exportBtn" class="secondary small">Copiar resumo</button>
          </div>
        </div>


        <div class="tables">
          <div>
            <h3>Totais por bebida</h3>
            <div id="drinkTotals" class="summary-list"></div>
          </div>
          <div>
            <h3>Totais por pessoa</h3>
            <div id="personTotals" class="summary-list"></div>
          </div>
        </div>
      </section>
    </main>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase-config.js"></script>
  <script src="data.js"></script>
  <script src="supabase.js"></script>
  <script src="admin.js"></script>
</body>
</html>
